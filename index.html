<style>
  :root {
    --bg: #0f0d14;
    --bg-2: #17141d;
    --surface: #1c1826;
    --surface-2: #241f30;
    --line: rgba(255,255,255,0.07);
    --line-2: rgba(255,255,255,0.12);
    --ink: #f3eee4;
    --ink-dim: #a69db0;
    --ink-soft: #6d6577;
    --accent: #c9a86b;       /* warm amber — coffee */
    --accent-2: #e8d5a3;
    --good: #6fc9a5;         /* soft emerald */
    --warn: #e89a4f;
    --bad: #e87272;
    --curve: #b89d68;
    --curve-glow: rgba(201,168,107,0.18);
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'DM Sans', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
    --r-sm: 10px;
    --r: 14px;
    --r-lg: 20px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(201,168,107,0.08), transparent 60%),
      radial-gradient(900px 500px at -10% 100%, rgba(111,201,165,0.05), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/><feColorMatrix values='0 0 0 0 0.95  0 0 0 0 0.93  0 0 0 0 0.9  0 0 0 0.035 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    pointer-events: none;
    z-index: 1;
    mix-blend-mode: overlay;
    opacity: 0.6;
  }

  #root { position: relative; z-index: 2; }

  /* Range sliders — unified look */
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    height: 22px;
    background: transparent;
    cursor: pointer;
    width: 100%;
    padding: 0;
    margin: 0;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 4px;
    background: linear-gradient(90deg, var(--accent) var(--pct, 50%), rgba(255,255,255,0.08) var(--pct, 50%));
    border-radius: 999px;
  }
  input[type=range]::-moz-range-track {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
  }
  input[type=range]::-moz-range-progress {
    height: 4px;
    background: var(--accent);
    border-radius: 999px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--ink);
    border: 3px solid var(--accent);
    margin-top: -7px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  input[type=range]::-webkit-slider-thumb:hover,
  input[type=range]:focus::-webkit-slider-thumb {
    transform: scale(1.15);
    box-shadow: 0 2px 10px rgba(201,168,107,0.5);
  }
  input[type=range]::-moz-range-thumb {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: var(--ink);
    border: 3px solid var(--accent);
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  button {
    font-family: inherit;
    -webkit-tap-highlight-color: transparent;
  }

  select, input[type=number], input[type=time] {
    font-family: inherit;
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: var(--r-sm);
    padding: 8px 12px;
    font-size: 14px;

  select:focus, input[type=number]:focus, input[type=time]:focus {

  input[type=range]:focus-visible {

  input[type=range]:focus-visible::-webkit-slider-thumb {
    box-shadow: 0 0 0 4px rgba(201,168,107,0.25), 0 2px 10px rgba(201,168,107,0.5);
  }

  /* Custom time input dark styling */
  input[type=time]::-webkit-calendar-picker-indicator {
    filter: invert(0.8);
    cursor: pointer;
    transition: opacity 0.15s ease;
  }
  input[type=time]::-webkit-calendar-picker-indicator:hover { opacity: 0.7; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: var(--surface-2);
    border-radius: 999px;
    border: 2px solid var(--bg);

  ::-webkit-scrollbar-thumb:hover { background: var(--line-2); }

  ::selection { background: var(--accent); color: var(--bg); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }

  .fade-up { animation: fadeUp 0.55s cubic-bezier(.22,.61,.36,1) both; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px) scale(0.985); }
    to   { opacity: 1; transform: translateY(0) scale(1); }

  .slide-in { animation: slideIn 0.4s cubic-bezier(.22,.61,.36,1) both; }

  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 0 var(--good); }

  @keyframes shimmer {

    100% { background-position: 200% 0; }

  /* Interactive surfaces */
  .dose-card {
    transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  }
  .dose-card:hover {
    border-color: var(--line-2);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px -12px rgba(0,0,0,0.4);
  }

  .btn-lift {
    transition: all 0.18s cubic-bezier(.22,.61,.36,1);
  }
  .btn-lift:hover {
    transform: translateY(-1px);
  }
  .btn-lift:active {
    transform: translateY(0);
    transition-duration: 0.08s;
  }

  .hero-card {
    position: relative;
  }
  .hero-card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: linear-gradient(135deg, rgba(201,168,107,0.35), transparent 40%, transparent 60%, rgba(201,168,107,0.15));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    pointer-events: none;
  }

  .section-card {
    position: relative;
    transition: border-color 0.25s ease;
  }
  .section-card:hover { border-color: var(--line-2); }

  .stat-value {
    transition: color 0.35s ease;
    will-change: color;
  }

  .reduced-motion-safe { animation: none !important; transition: none !important; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001s !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001s !important;
    }
  }
</style>

<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useMemo } = React;

/* ---------- constants & helpers ---------- */
const HL = 5.5; // caffeine half-life (hours)
const DAILY_LIMIT = 400;
const SLEEP_THRESHOLD = 50;

const DRINKS = {
  espresso:  { label: "Espresso shot",      mg: 64,  icon: "●" },
  coffee:    { label: "Drip coffee (8oz)",  mg: 95,  icon: "☕" },
  cold_brew: { label: "Cold brew (12oz)",   mg: 200, icon: "◉" },
  monster:   { label: "Monster Ultra",      mg: 150, icon: "⚡" },
  redbull:   { label: "Red Bull (8.4oz)",   mg: 80,  icon: "⚡" },
  tea_black: { label: "Black tea (8oz)",    mg: 47,  icon: "☘" },
  tea_green: { label: "Green tea (8oz)",    mg: 28,  icon: "☘" },
  matcha:    { label: "Matcha (1 tsp)",     mg: 70,  icon: "☘" },
  davidoff:  { label: "Davidoff 57 (1 tsp)", mg: 57, icon: "☕" },
  custom:    { label: "Custom",              mg: 100, icon: "✦" },
};

const STORAGE_KEYS = {
  doses:     "caffeine-doses-v2",
  peakStart: "cf-pS",
  peakEnd:   "cf-pE",
  sleepTime: "cf-sT",
  blockedWindows: "cf-blocked",
};

const toneColor = tone =>
  tone === "good" ? "var(--good)" :
  tone === "warn" ? "var(--warn)" :
  tone === "bad"  ? "var(--bad)"  : "var(--ink)";

const toneBg = tone =>
  tone === "good" ? "rgba(111,201,165,0.06)" :
  tone === "warn" ? "rgba(232,154,79,0.06)"  :
  tone === "bad"  ? "rgba(232,114,114,0.06)" : "transparent";

const toneBorder = tone =>
  tone === "good" ? "rgba(111,201,165,0.2)" :
  tone === "warn" ? "rgba(232,154,79,0.2)"  :
  tone === "bad"  ? "rgba(232,114,114,0.2)" : "var(--line)";

const toneGlow = tone =>
  tone === "good" ? "rgba(111,201,165,0.12)" :
  tone === "warn" ? "rgba(232,154,79,0.12)"  : "rgba(232,114,114,0.12)";

const CHART_PAD = { t: 28, r: 16, b: 30, l: 36 };

const fmtTime = (h, short = false) => {
  let x = ((h % 24) + 24) % 24;
  let mn = Math.round((x - Math.floor(x)) * 60);
  let hr = Math.floor(x);
  if (mn === 60) { hr += 1; mn = 0; }
  const h12 = hr === 0 ? 12 : hr > 12 ? hr - 12 : hr;
  const ap = hr >= 12 ? "PM" : "AM";
  const day = (!short && h >= 24) ? " next day" : "";
  return `${h12}:${String(mn).padStart(2, "0")} ${ap}${day}`;
};

const caffeineAt = (t, doses) => {
  let s = 0;
  for (const d of doses) {
    if (t >= d.time) {
      const el = t - d.time;
      s += d.mg * Math.min(1, el / 0.75) * Math.pow(0.5, el / HL);
    }
  }
  return s;
};

const peakAverage = (doses, pS, pE, step = 0.1) => {
  let sum = 0, n = 0;
  for (let t = pS; t <= pE; t += step) { sum += caffeineAt(t, doses); n++; }
  return n ? sum / n : 0;
};

/* Single-dose contribution to peak-window average per 1 mg.
   Analytical = ∫ min(1, (t-t_d)/0.75) * 0.5^((t-t_d)/HL) dt over [pS, pE], divided by (pE - pS). */
const peakCoefAt = (doseTime, pS, pE) => {
  if (doseTime >= pE) return 0;
  let sum = 0, n = 0;
  for (let t = pS; t <= pE; t += 0.1) {
    if (t >= doseTime) {
      const el = t - doseTime;
      sum += Math.min(1, el / 0.75) * Math.pow(0.5, el / HL);
    }
    n++;
  }
  return n ? sum / n : 0;
};
/* Residue at sleep time per 1 mg for a dose placed at doseTime. */
const sleepCoefAt = (doseTime, sT) => {
  if (doseTime > sT) return 0;
  const el = sT - doseTime;
  return Math.min(1, el / 0.75) * Math.pow(0.5, el / HL);
};

/* Exact LP mg allocator via vertex enumeration.
   Maximize Σ c_i m_i s.t.
     mgMin ≤ m_i ≤ mgMax,
     Σ m_i ≤ totalBudget,
     Σ s_i m_i ≤ sleepBudget  (only if respectSleep).
   At an LP optimum, at least N of (2N box + up to 2 resource) constraints are tight,
   so at most 2 variables are interior. We enumerate all such vertices exactly.
   For N ≤ 8 this is ≤ ~4100 candidates — instant and deterministic. */
const allocateMg = (times, pS, pE, sT, mgMin, mgMax, totalBudget, sleepBudget, respectSleep) => {
  const N = times.length;
  if (N === 0) return [];
  const c = times.map(t => peakCoefAt(t, pS, pE));
  const s = times.map(t => sleepCoefAt(t, sT));
  const EPS = 1e-6;

  const feasible = (mg) => {
    let tot = 0, sl = 0;
    for (let i = 0; i < N; i++) {
      if (mg[i] < mgMin - EPS || mg[i] > mgMax + EPS) return false;
      tot += mg[i]; sl += s[i] * mg[i];
    }
    if (tot > totalBudget + EPS) return false;
    if (respectSleep && sl > sleepBudget + EPS) return false;
    return true;
  };
  const objective = (mg) => { let v = 0; for (let i = 0; i < N; i++) v += c[i] * mg[i]; return v; };

  let bestMg = new Array(N).fill(mgMin), bestObj = -Infinity;
  if (feasible(bestMg)) bestObj = objective(bestMg);

  const tryVertex = (mg) => {
    if (!feasible(mg)) return;
    const obj = objective(mg);
    if (obj > bestObj) { bestObj = obj; bestMg = mg.slice(); }
  };

  // Enumerate basicMask (bits for variables at interior values) and for each
  // non-basic variable, pick mgMin or mgMax. Solve the linear system imposed
  // by which resource constraints are active (must equal number of basics).
  const maxK = 1 + (respectSleep ? 1 : 0); // up to 2 resource constraints
  for (let basicMask = 0; basicMask < (1 << N); basicMask++) {
    const basicIdx = [];
    for (let i = 0; i < N; i++) if (basicMask & (1 << i)) basicIdx.push(i);
    const k = basicIdx.length;
    if (k > maxK) continue;

    const nonBasic = [];
    for (let i = 0; i < N; i++) if (!(basicMask & (1 << i))) nonBasic.push(i);
    const nb = nonBasic.length;

    for (let bm = 0; bm < (1 << nb); bm++) {
      const mg = new Array(N);
      for (let j = 0; j < nb; j++) mg[nonBasic[j]] = (bm & (1 << j)) ? mgMax : mgMin;

      if (k === 0) {
        // All vars at bounds — pure corner
        for (const i of basicIdx) mg[i] = mgMin; // unused
        tryVertex(mg);
        continue;
      }

      // Active-constraint pairs: total=T, sleep=S. Need k active constraints.
      const active = respectSleep ? (k === 2 ? [["T", "S"]] : [["T"], ["S"]]) : [["T"]];
      for (const combo of active) {
        // Build k×k system on basic variables
        if (k === 1) {
          const a = combo[0] === "T" ? 1 : s[basicIdx[0]];
          if (Math.abs(a) < 1e-9) continue;
          let rhs = combo[0] === "T" ? totalBudget : sleepBudget;
          for (const j of nonBasic) rhs -= (combo[0] === "T" ? 1 : s[j]) * mg[j];
          mg[basicIdx[0]] = rhs / a;
        } else {
          // k === 2, combo = ["T","S"]
          const i1 = basicIdx[0], i2 = basicIdx[1];
          const a = 1,            b = 1;
          const c2 = s[i1],       d = s[i2];
          let r0 = totalBudget, r1 = sleepBudget;
          for (const j of nonBasic) { r0 -= mg[j]; r1 -= s[j] * mg[j]; }
          const det = a * d - b * c2;
          if (Math.abs(det) < 1e-9) continue;
          mg[i1] = (d * r0 - b * r1) / det;
          mg[i2] = (a * r1 - c2 * r0) / det;
        }
        tryVertex(mg);
      }
    }
  }
  return bestMg;
};

/* Main optimizer. Deterministic — same inputs produce the same output.
   - `lockedDoses` are fixed and contribute to peak + sleep + total budgets.
   - `blockedWindows` is an array of {start, end} (hours). New doses never land inside.
   - Produces `nNew` optimized doses (times + mg).
   - Grid-search (15-min) over time configs + exact LP mg allocation per config,
     then coordinate-descent refinement at 5-min resolution. */
const optimizeDoses = ({
  nNew, pS, pE, sT, respectSleep, capTotal, seedDoses, lockedDoses, earliestTime, blockedWindows
}) => {
  const N = Math.max(1, Math.min(8, nNew | 0));
  const locked = lockedDoses || [];
  const blocks = (blockedWindows || []).filter(w => w && w.end > w.start + 1e-6);
  const isBlocked = (t) => blocks.some(w => t >= w.start - 1e-9 && t < w.end - 1e-9);
  const TOTAL_CAP_RAW = capTotal ? DAILY_LIMIT : 800;
  const lockedTotal = locked.reduce((a, d) => a + d.mg, 0);
  const lockedSleepLevel = locked.length ? caffeineAt(sT, locked) : 0;
  const totalBudget = Math.max(0, TOTAL_CAP_RAW - lockedTotal);
  const sleepBudget = Math.max(0, SLEEP_THRESHOLD - lockedSleepLevel);
  const tMin = Math.max(4, pS - 2, earliestTime ?? 0);
  // Doses placed after the peak window contribute nothing to peak avg —
  // never suggest them. Also cap before bedtime so caffeine can start clearing.
  const tMax = Math.min(pE, sT - 0.5);
  const mgMin = 10, mgMax = 300;
  const clamp = (v, mn, mx) => Math.max(mn, Math.min(mx, v));
  const snapT = t => Math.round(t * 12) / 12;
  // Snap mg to 5mg increments. If that pushes sleep past threshold (LP held it at ≤budget
  // in continuous form, but rounding can overshoot), trim 5mg off the dose with the
  // largest sleep coefficient that's still above mgMin, repeat until under budget.
  const snapMgRespectSleep = (cand) => {
    const snapped = cand.map(d => ({ ...d, mg: Math.round(d.mg / 5) * 5 }));
    if (!respectSleep) return snapped;
    const sCoefs = snapped.map(d => sleepCoefAt(d.time, sT));
    const remaining = Math.max(0, SLEEP_THRESHOLD - lockedSleepLevel);
    let sleepUsed = snapped.reduce((a, d, i) => a + sCoefs[i] * d.mg, 0);
    let guard = 0;
    while (sleepUsed > remaining + 1e-6 && guard++ < 200) {
      let pick = -1, pickScore = -Infinity;
      for (let i = 0; i < snapped.length; i++) {
        if (snapped[i].mg <= mgMin) continue;
        if (sCoefs[i] > pickScore) { pickScore = sCoefs[i]; pick = i; }
      }
      if (pick < 0) break;
      snapped[pick].mg -= 5;
      sleepUsed -= 5 * sCoefs[pick];
    }
    return snapped;
  };

  // No valid window (peak window already passed, or bedtime too close)
  if (tMin >= tMax - 0.1) {
    return Array.from({ length: N }, (_, i) => ({
      time: snapT(clamp(tMin + i * 0.25, tMin, tMin + N)),
      mg: mgMin, type: "custom", locked: false,
    }));
  }

  const score = (cand) => {
    const all = locked.concat(cand);
    const peakAvg = peakAverage(all, pS, pE, 0.1);
    let penalty = 0;
    if (respectSleep) {
      // Only penalise the marginal sleep contribution from NEW doses,
      // relative to whatever budget the locked doses left over.
      // This prevents locked-dose over-runs from dominating and pushing
      // the optimizer toward useless late placements.
      const candSleep = caffeineAt(sT, cand);
      const remaining = Math.max(0, SLEEP_THRESHOLD - lockedSleepLevel);
      const excess = Math.max(0, candSleep - remaining);
      penalty += excess ** 2 * 4;
    }
    const tot = all.reduce((a, d) => a + d.mg, 0);
    if (capTotal && tot > DAILY_LIMIT) penalty += (tot - DAILY_LIMIT) ** 2 * 1.5;
    return peakAvg - penalty;
  };

  // Build a candidate from a given set of times using the exact LP mg allocator.
  // LP solution is snap-rounded to 5mg; if the rounding pushes sleep past threshold,
  // trim back the dose with the largest sleep contribution.
  const buildFromTimes = (times) => {
    const mgs = allocateMg(times, pS, pE, sT, mgMin, mgMax, totalBudget, sleepBudget, respectSleep);
    const raw = times.map((t, i) => ({ time: snapT(t), mg: mgs[i] }));
    return snapMgRespectSleep(raw);
  };

  // --- Deterministic grid search over dose-time configurations ---
  // 15-min resolution over [max(tMin, pS - 1.5), min(tMax, pE + 0.25)].
  const gridLo = Math.max(tMin, pS - 1.5);
  const gridHi = Math.min(tMax, pE + 0.25);
  const gridStep = 0.25;
  const slots = [];
  for (let t = gridLo; t <= gridHi + 1e-9; t += gridStep) {
    const st = Math.round(t * 12) / 12;
    if (!isBlocked(st)) slots.push(st);
  }
  if ((slots.length === 0 || slots[0] > tMin + 1e-9) && !isBlocked(tMin)) slots.unshift(tMin);
  if (slots.length && slots[slots.length - 1] < tMax - 1e-9 && !isBlocked(tMax)) slots.push(tMax);
  // All slots blocked? Fall back to minimum doses at tMin.
  if (slots.length === 0) {
    return Array.from({ length: N }, (_, i) => ({
      time: snapT(clamp(tMin + i * 0.25, tMin, tMax)),
      mg: mgMin, type: "custom", locked: false,
    }));
  }

  let best = null, bestScore = -Infinity;
  const MAX_COMBOS = 10000;

  if (N <= 4) {
    // Exhaustive enumeration of ordered combinations (no repeats)
    let count = 0;
    const acc = [];
    const rec = (start) => {
      if (count >= MAX_COMBOS) return;
      if (acc.length === N) {
        count++;
        const cand = buildFromTimes(acc);
        const s = score(cand);
        if (s > bestScore) { best = cand.map(x => ({ ...x })); bestScore = s; }
        return;
      }
      for (let i = start; i < slots.length; i++) {
        if (count >= MAX_COMBOS) return;
        acc.push(slots[i]);
        rec(i + 1);
        acc.pop();
      }
    };
    rec(0);
  } else {
    // N > 4: stride through combinations with a step to keep count sane
    const stride = Math.max(1, Math.ceil(Math.pow(slots.length, N / 4) / MAX_COMBOS));
    const acc = [];
    let count = 0;
    const rec = (start) => {
      if (count >= MAX_COMBOS) return;
      if (acc.length === N) {
        count++;
        const cand = buildFromTimes(acc);
        const s = score(cand);
        if (s > bestScore) { best = cand.map(x => ({ ...x })); bestScore = s; }
        return;
      }
      for (let i = start; i < slots.length; i += stride) {
        if (count >= MAX_COMBOS) return;
        acc.push(slots[i]);
        rec(i + 1);
        acc.pop();
      }
    };
    rec(0);
  }

  // Seed-dose: evaluate user's current config too (skip if any seed time is blocked)
  if (seedDoses && seedDoses.length === N) {
    const seedTimes = seedDoses.map(d => snapT(clamp(d.time, tMin, tMax))).sort((a, b) => a - b);
    if (!seedTimes.some(isBlocked)) {
      const cand = buildFromTimes(seedTimes);
      const s = score(cand);
      if (s > bestScore) { best = cand.map(x => ({ ...x })); bestScore = s; }
    }
  }

  if (!best) {
    // Degenerate fallback
    best = Array.from({ length: N }, (_, i) => ({
      time: snapT(clamp(tMin + i * 0.25, tMin, tMax)), mg: mgMin,
    }));
    bestScore = score(best);
  }

  // --- Deterministic coordinate descent refinement ---
  // For each dose, try shifting its time by ±{5, 10, 15} minutes; recompute exact
  // LP mg allocation; accept improvements. Iterate until no dose moves.
  const fiveMin = 1 / 12;
  const deltas = [-3, -2, -1, 1, 2, 3]; // ±5/10/15 min
  let improved = true, guard = 0;
  while (improved && guard++ < 50) {
    improved = false;
    for (let i = 0; i < N; i++) {
      const origT = best[i].time;
      for (const d of deltas) {
        const newT = snapT(clamp(origT + d * fiveMin, tMin, tMax));
        if (newT === origT) continue;
        if (isBlocked(newT)) continue;
        const times = best.map((x, j) => j === i ? newT : x.time).sort((a, b) => a - b);
        const cand = buildFromTimes(times);
        const sc = score(cand);
        if (sc > bestScore + 1e-5) {
          best = cand.map(x => ({ ...x }));
          bestScore = sc;
          improved = true;
        }
      }
    }
  }

  return best.map(d => ({ time: d.time, mg: d.mg, type: "custom", locked: false }));
};

function useAnimatedNumber(target, duration = 500) {
  const [val, setVal] = useState(target);
  useEffect(() => {
    const from = val;
    if (from === target || !Number.isFinite(from) || !Number.isFinite(target)) {
      setVal(target);
      return;
    }
    let raf;
    const start = performance.now();
    const tick = (now) => {
      const t = Math.min(1, (now - start) / duration);
      const e = 1 - Math.pow(1 - t, 3);
      setVal(from + (target - from) * e);
      if (t < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  // eslint-disable-next-line
  }, [target, duration]);
  return val;
}

/* ---------- Chart ---------- */
function Chart({ doses, pS, pE, sT, clearTime, nowHour, showNow, blockedWindows }) {
  const ref = useRef(null);
  const [hover, setHover] = useState(null);
  const [dims, setDims] = useState({ W: 0, H: 0 });
  const progressRef = useRef(1);
  const hoverRef = useRef(null);

  const draw = useCallback((hoverPt) => {
    const c = ref.current;
    if (!c) return;
    const ctx = c.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    const r = c.getBoundingClientRect();
    if (r.width === 0 || r.height === 0) return;

    c.width = r.width * dpr;
    c.height = r.height * dpr;
    ctx.scale(dpr, dpr);
    const W = r.width, H = r.height;
    setDims({ W, H });

    const p = CHART_PAD;
    const cW = W - p.l - p.r, cH = H - p.t - p.b;
    if (cW <= 0 || cH <= 0) return;

    ctx.clearRect(0, 0, W, H);

    const eT = Math.max(sT + 1, 26, clearTime ? clearTime + 1 : 26);
    const pts = [];
    let mx = 150;
    for (let t = 6; t <= eT; t += 0.2) {
      const v = caffeineAt(t, doses);
      if (v > mx) mx = v;
      pts.push({ t, v });
    }
    mx = Math.ceil(mx / 50) * 50 + 20;

    const xO = t => p.l + ((t - 6) / (eT - 6)) * cW;
    const yO = v => p.t + (1 - v / mx) * cH;

    // Zones
    ctx.fillStyle = "rgba(111,201,165,0.06)";
    ctx.fillRect(xO(pS), p.t, xO(pE) - xO(pS), cH);
    ctx.fillStyle = "rgba(232,114,114,0.06)";
    ctx.fillRect(xO(sT), p.t, xO(eT) - xO(sT), cH);

    // Blocked windows — striped red-ish overlay
    if (blockedWindows && blockedWindows.length) {
      for (const w of blockedWindows) {
        if (!w || w.end <= w.start) continue;
        const x0 = xO(Math.max(w.start, 6));
        const x1 = xO(Math.min(w.end, eT));
        if (x1 <= x0) continue;
        ctx.fillStyle = "rgba(232,154,79,0.08)";
        ctx.fillRect(x0, p.t, x1 - x0, cH);
        // Diagonal hatch lines
        ctx.save();
        ctx.beginPath();
        ctx.rect(x0, p.t, x1 - x0, cH);
        ctx.clip();
        ctx.strokeStyle = "rgba(232,154,79,0.22)";
        ctx.lineWidth = 1;
        const hatchStep = 8;
        for (let hx = x0 - cH; hx < x1 + cH; hx += hatchStep) {
          ctx.beginPath();
          ctx.moveTo(hx, p.t + cH);
          ctx.lineTo(hx + cH, p.t);
          ctx.stroke();
        }
        ctx.restore();
      }
    }

    // Horizontal grid
    ctx.strokeStyle = "rgba(255,255,255,0.04)";
    ctx.lineWidth = 1;
    for (let v = 0; v <= mx; v += 50) {
      ctx.beginPath();
      ctx.moveTo(p.l, yO(v));
      ctx.lineTo(p.l + cW, yO(v));
      ctx.stroke();
    }

    // 50 mg line
    ctx.setLineDash([2, 4]);
    ctx.strokeStyle = "rgba(111,201,165,0.35)";
    ctx.beginPath();
    ctx.moveTo(p.l, yO(50));
    ctx.lineTo(p.l + cW, yO(50));
    ctx.stroke();
    ctx.setLineDash([]);

    const progress = progressRef.current;
    const progT = 6 + (eT - 6) * progress;

    // Dose markers — fade in as curve reaches each dose
    doses.forEach(d => {
      const dx = xO(d.time);
      const a = Math.max(0, Math.min(1, (progT - d.time) * 1.2));
      if (a <= 0) return;
      ctx.strokeStyle = `rgba(201,168,107,${0.25 * a})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(dx, p.t);
      ctx.lineTo(dx, p.t + cH);
      ctx.stroke();
      ctx.fillStyle = `rgba(201,168,107,${0.9 * a})`;
      ctx.beginPath();
      ctx.arc(dx, p.t - 4, 2.5, 0, Math.PI * 2);
      ctx.fill();
    });

    const progIdx = Math.max(2, Math.ceil(pts.length * progress));
    const visible = pts.slice(0, progIdx);

    // Curve fill — gradient
    if (visible.length > 1) {
      const grad = ctx.createLinearGradient(0, p.t, 0, p.t + cH);
      grad.addColorStop(0, "rgba(201,168,107,0.28)");
      grad.addColorStop(1, "rgba(201,168,107,0)");
      ctx.beginPath();
      ctx.moveTo(xO(visible[0].t), yO(0));
      visible.forEach(q => ctx.lineTo(xO(q.t), yO(q.v)));
      ctx.lineTo(xO(visible[visible.length - 1].t), yO(0));
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Curve stroke
      ctx.beginPath();
      visible.forEach((q, i) => i === 0 ? ctx.moveTo(xO(q.t), yO(q.v)) : ctx.lineTo(xO(q.t), yO(q.v)));
      ctx.strokeStyle = "#c9a86b";
      ctx.lineWidth = 2;
      ctx.shadowColor = "rgba(201,168,107,0.45)";
      ctx.shadowBlur = 10;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Leading dot — rides the tip of the curve during animation
      if (progress < 1) {
        const tip = visible[visible.length - 1];
        ctx.beginPath();
        ctx.arc(xO(tip.t), yO(tip.v), 3.5, 0, Math.PI * 2);
        ctx.fillStyle = "#e8d5a3";
        ctx.shadowColor = "rgba(232,213,163,0.9)";
        ctx.shadowBlur = 14;
        ctx.fill();
        ctx.shadowBlur = 0;
      }
    }

    // Safe-to-sleep marker — fade in as curve reaches it
    if (clearTime && clearTime <= eT) {
      const a = Math.max(0, Math.min(1, (progT - clearTime) * 1.2));
      if (a > 0) {
        const cx = xO(clearTime);
        const cy = yO(50);
        ctx.setLineDash([2, 3]);
        ctx.strokeStyle = `rgba(111,201,165,${0.6 * a})`;
        ctx.beginPath();
        ctx.moveTo(cx, p.t);
        ctx.lineTo(cx, p.t + cH);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.arc(cx, cy, 5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(111,201,165,${a})`;
        ctx.fill();
        ctx.strokeStyle = "#0f0d14";
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    // "Now" line
    if (showNow && nowHour >= 6 && nowHour <= eT) {
      const nx = xO(nowHour);
      ctx.setLineDash([3, 5]);
      ctx.strokeStyle = "rgba(243,238,228,0.25)";
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(nx, p.t);
      ctx.lineTo(nx, p.t + cH);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = "rgba(243,238,228,0.55)";
      ctx.font = "600 9px 'JetBrains Mono', monospace";
      ctx.textAlign = "center";
      ctx.fillText("NOW", nx, p.t - 5);
      ctx.beginPath();
      ctx.arc(nx, p.t, 3, 0, Math.PI * 2);
      ctx.fillStyle = "rgba(243,238,228,0.7)";
      ctx.fill();
    }

    // Axis labels
    ctx.fillStyle = "rgba(166,157,176,0.7)";
    ctx.font = "500 10px 'DM Sans', sans-serif";
    ctx.textAlign = "center";
    const step = eT > 30 ? 4 : 3;
    for (let t = 6; t <= eT; t += step) {
      ctx.fillText(fmtTime(t, true), xO(t), p.t + cH + 16);
    }
    ctx.textAlign = "right";
    for (let v = 0; v <= mx; v += 100) {
      ctx.fillText(v + "", p.l - 6, yO(v) + 3);
    }

    // Hover crosshair
    if (hoverPt) {
      const { t: ht, v: hv } = hoverPt;
      const hx = xO(ht);
      const hy = yO(hv);
      ctx.strokeStyle = "rgba(243,238,228,0.25)";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(hx, p.t);
      ctx.lineTo(hx, p.t + cH);
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(hx, hy, 4, 0, Math.PI * 2);
      ctx.fillStyle = "#f3eee4";
      ctx.fill();
      ctx.strokeStyle = "#c9a86b";
      ctx.lineWidth = 2;
      ctx.stroke();

      // Tooltip
      const label = `${Math.round(hv)} mg · ${fmtTime(ht, true)}`;
      ctx.font = "600 11px 'JetBrains Mono', monospace";
      const tw = ctx.measureText(label).width;
      const boxW = tw + 16, boxH = 22;
      let bx = hx + 10;
      if (bx + boxW > W - 4) bx = hx - boxW - 10;
      bx = Math.max(p.l, bx);
      let by = hy - boxH - 8;
      by = Math.max(p.t, by);
      by = Math.min(p.t + cH - boxH, by);
      ctx.fillStyle = "rgba(28,24,38,0.95)";
      ctx.strokeStyle = "rgba(201,168,107,0.4)";
      ctx.lineWidth = 1;
      if (ctx.roundRect) {
        ctx.beginPath(); ctx.roundRect(bx, by, boxW, boxH, 6); ctx.fill(); ctx.stroke();
      } else {
        ctx.fillRect(bx, by, boxW, boxH); ctx.strokeRect(bx, by, boxW, boxH);
      }
      ctx.fillStyle = "#f3eee4";
      ctx.textAlign = "left";
      ctx.fillText(label, bx + 8, by + 15);
    }
  }, [doses, pS, pE, sT, clearTime, nowHour, showNow, blockedWindows]);

  useEffect(() => { hoverRef.current = hover; }, [hover]);

  // Curve draw-in animation on data/settings change
  useEffect(() => {
    progressRef.current = 0;
    let raf;
    const start = performance.now();
    const dur = 420;
    const tick = (now) => {
      const t = Math.min(1, (now - start) / dur);
      progressRef.current = 1 - Math.pow(1 - t, 3);
      draw(hoverRef.current);
      if (t < 1) raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [draw]);

  // Hover-only redraw (progress stays where it is)
  useEffect(() => {
    const raf = requestAnimationFrame(() => draw(hover));
    return () => cancelAnimationFrame(raf);
  }, [hover]);

  useEffect(() => {
    let id;
    const h = () => { clearTimeout(id); id = setTimeout(() => draw(hoverRef.current), 150); };
    window.addEventListener("resize", h);
    return () => { window.removeEventListener("resize", h); clearTimeout(id); };
  }, [draw]);

  const onMove = (e) => {
    const c = ref.current;
    if (!c) return;
    const r = c.getBoundingClientRect();
    const p = CHART_PAD;
    const cW = r.width - p.l - p.r;
    if (cW <= 0) return;
    const touch = e.touches && e.touches[0];
    const clientX = touch ? touch.clientX : e.clientX;
    const x = clientX - r.left;
    if (x < p.l || x > p.l + cW) { setHover(null); return; }
    const eT = Math.max(sT + 1, 26, clearTime ? clearTime + 1 : 26);
    const t = 6 + ((x - p.l) / cW) * (eT - 6);
    const tSnapped = Math.round(t / 0.05) * 0.05;
    setHover(prev => {
      if (prev && Math.abs(prev.t - tSnapped) < 0.05) return prev;
      return { t: tSnapped, v: caffeineAt(tSnapped, doses) };
    });
  };

  return (
    <canvas
      ref={ref}
      onMouseMove={onMove}
      onMouseLeave={() => setHover(null)}
      onTouchStart={onMove}
      onTouchMove={onMove}
      onTouchEnd={() => setHover(null)}
      style={{ width: "100%", height: "280px", display: "block", touchAction: "pan-y" }}
    />
  );
}

const getNow = () => { const d = new Date(); return d.getHours() + d.getMinutes() / 60; };

/* ---------- App ---------- */
function App() {
  /* Live time — ticks every minute */
  const [nowHour, setNowHour] = useState(getNow);
  useEffect(() => {
    const id = setInterval(() => setNowHour(getNow()), 60000);
    return () => clearInterval(id);
  }, []);

  const [doses, setDoses] = useState(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEYS.doses);
      if (saved) {
        const parsed = JSON.parse(saved);
        const valid =
          Array.isArray(parsed) && parsed.length > 0 &&
          parsed.every(d =>
            typeof d === "object" && d !== null &&
            Number.isFinite(d.time) && d.time >= 0 && d.time <= 48 &&
            Number.isFinite(d.mg)   && d.mg   >= 1 && d.mg   <= 1000 &&
            typeof d.type === "string"
          );
        if (valid) return parsed;
      }
    } catch(e) {}
    return [
      { time: 8.5,  mg: 95, type: "coffee",   locked: false },
      { time: 14,   mg: 64, type: "espresso", locked: false },
    ];
  });
  const [pS, setPS] = useState(() => +localStorage.getItem(STORAGE_KEYS.peakStart) || 9);
  const [pE, setPE] = useState(() => +localStorage.getItem(STORAGE_KEYS.peakEnd) || 17);
  const [sT, setST] = useState(() => +localStorage.getItem(STORAGE_KEYS.sleepTime) || 23);

  useEffect(() => { localStorage.setItem(STORAGE_KEYS.doses, JSON.stringify(doses)); }, [doses]);
  useEffect(() => { localStorage.setItem(STORAGE_KEYS.peakStart, pS); }, [pS]);
  useEffect(() => { localStorage.setItem(STORAGE_KEYS.peakEnd, pE); }, [pE]);
  useEffect(() => { localStorage.setItem(STORAGE_KEYS.sleepTime, sT); }, [sT]);

  const handleSetPS = v => { setPS(v); if (v >= pE) setPE(Math.min(v + 0.25, 25)); };
  const handleSetPE = v => { setPE(v); if (v <= pS) setPS(Math.max(v - 0.25, 6)); };

  /* derived values */
  const total = doses.reduce((s, d) => s + d.mg, 0);
  const peakAvg = useMemo(() => peakAverage(doses, pS, pE, 0.25), [doses, pS, pE]);
  const sleepLevel = caffeineAt(sT, doses);
  const sleepOk = sleepLevel < SLEEP_THRESHOLD;
  const totalOk = total <= DAILY_LIMIT;

  const clearTime = useMemo(() => {
    if (!doses.length) return null;
    const maxDoseTime = Math.max(...doses.map(d => d.time));
    // Start scanning AFTER the last dose has fully absorbed (+0.75h absorption window)
    // so we don't mistake the pre-dose trough for "clear"
    const scanStart = maxDoseTime + 0.75;
    for (let t = scanStart; t <= 72; t += 0.1) {
      if (caffeineAt(t, doses) < SLEEP_THRESHOLD) return t;
    }
    return null;
  }, [doses]);

  let verdict, verdictTone;
  if (sleepOk && totalOk && peakAvg >= 60) { verdict = "Optimal"; verdictTone = "good"; }
  else if (sleepOk && peakAvg >= 40) { verdict = totalOk ? "Decent" : "Over daily limit"; verdictTone = "warn"; }
  else { verdict = !sleepOk ? "Sleep delayed" : "Low alertness"; verdictTone = "bad"; }

  const animTotal = useAnimatedNumber(total);
  const animPeakAvg = useAnimatedNumber(peakAvg);

  const tips = useMemo(() => {
    const t = [];
    if (!sleepOk && clearTime) t.push({ tone: "bad", text: `Caffeine stays above ${SLEEP_THRESHOLD}mg until ${fmtTime(clearTime)}. Bedtime is compromised.` });
    else if (clearTime) t.push({ tone: "good", text: `You'll be safe to sleep by ${fmtTime(clearTime)}.` });
    if (!totalOk) t.push({ tone: "warn", text: `${total} mg total exceeds the 400 mg daily guideline.` });
    if (peakAvg < 50 && doses.length > 0) t.push({ tone: "warn", text: `Peak alertness average is only ${Math.round(peakAvg)} mg — consider an earlier dose.` });
    if (planToday && nowHour > pE) t.push({ tone: "warn", text: `Your peak window has already passed today. Update your schedule or plan for tomorrow.` });

    if (doses.length >= 2) {
      const sorted = [...doses].sort((a,b) => a.time - b.time);
      for (let i = 0; i < sorted.length - 1; i++) {
        const gapStart = sorted[i].time + 1;
        const gapEnd   = sorted[i+1].time - 0.25;
        if (gapEnd - gapStart < 1) continue;
        let low = { v: 999, t: gapStart };
        for (let tt = gapStart; tt <= gapEnd; tt += 0.25) {
          const v = caffeineAt(tt, doses);
          if (v < low.v) low = { t: tt, v };
        }
        if (low.v < 30) {
          t.push({ tone: "warn", text: `Afternoon dip around ${fmtTime(low.t, true)} (~${Math.round(low.v)} mg).` });
          break;
        }
      }
    }
    return t;
  }, [doses, sleepOk, clearTime, totalOk, total, peakAvg, planToday, nowHour, pE]);

  const updateDose = (i, patch) => {
    const a = [...doses];
    a[i] = { ...a[i], ...patch };
    setDoses(a);
  };
  const removeDose = i => setDoses(doses.filter((_, j) => j !== i));
  const addDose = () => {
    const lt = doses.length ? doses[doses.length - 1].time + 2 : 10;
    setDoses([...doses, { time: Math.min(lt, 23), mg: 95, type: "coffee", locked: false }]);
  };

  const resetAll = () => {
    if (confirm("Reset all doses and settings?")) {
      setDoses([{ time: 8.5, mg: 95, type: "coffee", locked: false }]);
      setPS(9); setPE(17); setST(23);
      setPrevDoses(null);
      setLastOpt(null);
    }
  };

  /* Optimizer state */
  const unlockedCount = doses.filter(d => !d.locked).length;
  const lockedCount = doses.length - unlockedCount;
  const [respectSleep, setRespectSleep] = useState(true);
  const [capTotal, setCapTotal] = useState(true);
  const [planToday, setPlanToday] = useState(true);
  const [targetDoseCount, setTargetDoseCount] = useState(Math.max(1, unlockedCount));
  const [blockedWindows, setBlockedWindows] = useState(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEYS.blockedWindows);
      return raw ? JSON.parse(raw) : [];
    } catch { return []; }
  });
  useEffect(() => {
    localStorage.setItem(STORAGE_KEYS.blockedWindows, JSON.stringify(blockedWindows));
  }, [blockedWindows]);
  const [prevDoses, setPrevDoses] = useState(null);
  const [lastOpt, setLastOpt] = useState(null);
  const [optimizing, setOptimizing] = useState(false);
  const lastOptTimerRef = useRef(null);
  useEffect(() => () => clearTimeout(lastOptTimerRef.current), []);

  const runOptimize = () => {
    setOptimizing(true);
    const beforeAvg = peakAvg;
    const beforeSleep = caffeineAt(sT, doses);
    // When planning for today, doses already consumed (time < now) are fixed context
    const effectiveLocked = planToday
      ? doses.filter(d => d.locked || d.time < nowHour)
      : doses.filter(d => d.locked);
    const effectiveUnlocked = doses.filter(d => !d.locked && !(planToday && d.time < nowHour));
    const earliestNew = planToday ? nowHour + 0.25 : undefined;
    requestAnimationFrame(() => {
      const optimized = optimizeDoses({
        nNew: targetDoseCount,
        pS, pE, sT, respectSleep, capTotal,
        seedDoses: targetDoseCount === effectiveUnlocked.length ? effectiveUnlocked : null,
        lockedDoses: effectiveLocked,
        earliestTime: earliestNew,
        blockedWindows,
      });
      const merged = [...effectiveLocked, ...optimized].sort((a, b) => a.time - b.time);
      setPrevDoses(doses);
      setDoses(merged);
      const afterAvg = peakAverage(merged, pS, pE, 0.25);
      const afterSleep = caffeineAt(sT, merged);
      setLastOpt({ beforeAvg, afterAvg, beforeSleep, afterSleep });
      clearTimeout(lastOptTimerRef.current);
      lastOptTimerRef.current = setTimeout(() => setLastOpt(null), 6000);
      setOptimizing(false);
    });
  };

  const undoOptimize = () => {
    if (!prevDoses) return;
    setDoses(prevDoses);
    setTargetDoseCount(Math.max(1, prevDoses.filter(d => !d.locked).length));
    setPrevDoses(null);
    setLastOpt(null);
  };

  return (

function HeroStat({ label, value, tone, big, mono, dot, sub, bar }) {
  const color = toneColor(tone);
  return (
    <div>
      <div style={{
        fontSize: "11px", textTransform: "uppercase", letterSpacing: "0.15em",
        color: "var(--ink-soft)", fontFamily: "var(--mono)", marginBottom: "8px",
        display: "flex", alignItems: "center", gap: "8px"
      }}>
        {dot && (
          <span style={{
            width: "7px", height: "7px", borderRadius: "50%", background: color,
            animation: tone === "good" ? "pulse-dot 2s ease-in-out infinite" : "none"
          }} />
        )}
        {label}
      </div>
      <div className="stat-value" style={{
        fontFamily: big ? "var(--serif)" : mono ? "var(--mono)" : "var(--sans)",
        fontWeight: big ? 500 : mono ? 500 : 600,
        fontSize: big ? "clamp(26px, 4.5vw, 36px)" : "clamp(20px, 3.5vw, 26px)",
        color,
        lineHeight: 1.1,
        letterSpacing: big ? "-0.02em" : "-0.01em"
      }}>
        {value}
      </div>
      {sub && (
        <div style={{ fontSize: "12px", color: "var(--ink-soft)", marginTop: "4px", fontFamily: "var(--mono)" }}>
          {sub}
        </div>
      )}
      {bar && (
        <div style={{
          height: "3px", background: "rgba(255,255,255,0.06)", borderRadius: "999px",
          marginTop: "10px", overflow: "hidden"
        }}>
          <div style={{
            width: `${Math.min(100, (bar.value / bar.max) * 100)}%`,
            height: "100%",
            background: bar.value > bar.max ? "var(--warn)" : "var(--accent)",
            borderRadius: "999px",
            transition: "width 0.4s cubic-bezier(.22,.61,.36,1), background 0.3s ease"
          }} />
        </div>
      )}
    </div>
  );
}

function BlockedWindowsEditor({ windows, setWindows }) {
  const add = () => {
    const last = windows[windows.length - 1];
    const start = last ? Math.min(23, last.end + 1) : 12;
    const end = Math.min(24, start + 1);
    setWindows([...windows, { start, end, label: "" }]);
  };
  const remove = (i) => setWindows(windows.filter((_, j) => j !== i));
  const update = (i, patch) => setWindows(windows.map((w, j) => j === i ? { ...w, ...patch } : w));
  return (
    <div style={{
      background: "var(--surface-2)",
      border: "1px solid var(--line)",
      borderRadius: "var(--r)",
      padding: "12px 14px",
      margin: "12px 0 14px",
      display: "flex", flexDirection: "column", gap: "10px"
    }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: "8px" }}>
        <div>
          <div style={{
            fontSize: "10px", textTransform: "uppercase", letterSpacing: "0.15em",
            color: "var(--ink-soft)", fontFamily: "var(--mono)", fontWeight: 500
          }}>Unavailable windows</div>
          <div style={{ fontSize: "11px", color: "var(--ink-soft)", marginTop: "2px" }}>
            Optimizer won't place doses during these times (gym, meetings, etc.)
          </div>
        </div>
        <button
          type="button"
          onClick={add}
          className="btn-lift"
          style={{
            padding: "6px 12px",
            borderRadius: "var(--r-sm)",
            border: "1px solid var(--line-2)",
            background: "transparent",
            color: "var(--ink-dim)",
            cursor: "pointer",
            fontSize: "12px",
            fontFamily: "var(--mono)",
          }}
        >+ Add</button>
      </div>
      {windows.length === 0 ? (
        <div style={{ fontSize: "12px", color: "var(--ink-soft)", fontStyle: "italic", fontFamily: "var(--serif)" }}>
          No blocked windows.
        </div>
      ) : (
        windows.map((w, i) => (
          <BlockedWindowRow
            key={i}
            window={w}
            onChange={(patch) => update(i, patch)}
            onRemove={() => remove(i)}
          />
        ))
      )}
    </div>
  );
}

function BlockedWindowRow({ window, onChange, onRemove }) {
  const [draftStart, setDraftStart] = useState(window.start);
  const [draftEnd, setDraftEnd] = useState(window.end);
  useEffect(() => { setDraftStart(window.start); }, [window.start]);
  useEffect(() => { setDraftEnd(window.end); }, [window.end]);
  const startTimer = useRef(null);
  const endTimer = useRef(null);
  useEffect(() => () => { clearTimeout(startTimer.current); clearTimeout(endTimer.current); }, []);

  const handleStart = (e) => {
    const v = parseFloat(e.target.value);
    setDraftStart(v);
    clearTimeout(startTimer.current);
    startTimer.current = setTimeout(() => {
      onChange({ start: v, end: Math.max(v + 0.25, draftEnd) });
    }, 120);
  };
  const handleEnd = (e) => {
    const v = parseFloat(e.target.value);
    setDraftEnd(v);
    clearTimeout(endTimer.current);
    endTimer.current = setTimeout(() => {
      onChange({ end: v, start: Math.min(draftStart, v - 0.25) });
    }, 120);
  };

  const spct = ((draftStart - 4) / (24 - 4)) * 100;
  const epct = ((draftEnd - 4) / (24 - 4)) * 100;
  return (
    <div style={{
      display: "grid",
      gridTemplateColumns: "1fr auto",
      gap: "8px 12px",
      alignItems: "center",
      padding: "10px 12px",
      background: "rgba(232,154,79,0.06)",
      border: "1px solid rgba(232,154,79,0.18)",
      borderRadius: "var(--r-sm)",
    }}>
      <input
        type="text"
        value={window.label ?? ""}
        onChange={(e) => onChange({ label: e.target.value })}
        placeholder="e.g. Gym, Meeting"
        style={{
          background: "transparent", border: "none", outline: "none",
          color: "var(--ink)", fontSize: "13px", fontWeight: 500,
          padding: 0, width: "100%", fontFamily: "var(--sans)"
        }}
      />
      <button
        type="button"
        onClick={onRemove}
        aria-label="Remove window"
        className="btn-lift"
        style={{
          background: "transparent", border: "1px solid var(--line-2)",
          color: "var(--ink-soft)", cursor: "pointer",
          width: "26px", height: "26px", borderRadius: "50%",
          fontSize: "14px", lineHeight: 1, display: "inline-flex",
          alignItems: "center", justifyContent: "center",
        }}
      >×</button>
      <div style={{ gridColumn: "1 / -1", display: "grid", gridTemplateColumns: "1fr 1fr", gap: "10px" }}>
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: "11px", color: "var(--ink-soft)", fontFamily: "var(--mono)", marginBottom: "2px" }}>
            <span>Start</span>
            <span style={{ color: "var(--accent-2)" }}>{fmtTime(draftStart, true)}</span>
          </div>
          <input
            type="range" min={4} max={24} step={0.25}
            value={draftStart} onChange={handleStart}
            style={{ "--pct": `${spct}%` }}
          />
        </div>
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: "11px", color: "var(--ink-soft)", fontFamily: "var(--mono)", marginBottom: "2px" }}>
            <span>End</span>
            <span style={{ color: "var(--accent-2)" }}>{fmtTime(draftEnd, true)}</span>
          </div>
          <input
            type="range" min={4} max={24} step={0.25}
            value={draftEnd} onChange={handleEnd}
            style={{ "--pct": `${epct}%` }}
          />
        </div>
      </div>
    </div>
  );
}

function DoseRow({ index, dose, onChange, onRemove, isOnlyDose, enterDelay = 0, isPast = false }) {
  const [draftMg, setDraftMg] = useState(dose.mg);
  const [draftTime, setDraftTime] = useState(dose.time);
  useEffect(() => { setDraftMg(dose.mg); }, [dose.mg]);
  useEffect(() => { setDraftTime(dose.time); }, [dose.time]);
  const mgTimerRef = useRef(null);
  const timeTimerRef = useRef(null);
  useEffect(() => () => { clearTimeout(mgTimerRef.current); clearTimeout(timeTimerRef.current); }, []);
  const locked = !!dose.locked;
  const handleMgChange = e => {
    if (locked) return;
    const v = parseInt(e.target.value);
    setDraftMg(v);
    clearTimeout(mgTimerRef.current);
    mgTimerRef.current = setTimeout(() => onChange({ mg: v, type: "custom" }), 120);
  };
  const handleTimeChange = e => {
    if (locked) return;
    const v = parseFloat(e.target.value);
    setDraftTime(v);
    clearTimeout(timeTimerRef.current);
    timeTimerRef.current = setTimeout(() => onChange({ time: v }), 120);
  };
  const T_MIN = 4, T_MAX = 24;
  const timePct = ((draftTime - T_MIN) / (T_MAX - T_MIN)) * 100;
  const toggleLock = () => onChange({ locked: !locked });

  return (
    <div className="dose-card slide-in" style={{
      background: locked
        ? "rgba(201,168,107,0.05)"
        : isPast
          ? "rgba(201,168,107,0.03)"
          : "var(--surface-2)",
      border: `1px solid ${locked ? "rgba(201,168,107,0.3)" : isPast ? "rgba(201,168,107,0.18)" : "var(--line)"}`,
      borderRadius: "var(--r)",
      padding: "14px 16px",
      display: "flex",
      flexDirection: "column",
      gap: "12px",
      animationDelay: `${enterDelay}s`,
      opacity: 1
    }}>
      {/* Top row: badge + select + remove */}
      <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
        <div style={{
          width: "26px", height: "26px", borderRadius: "50%",
          background: isPast
            ? "linear-gradient(135deg, rgba(201,168,107,0.5) 0%, rgba(168,139,80,0.5) 100%)"
            : "linear-gradient(135deg, var(--accent) 0%, #a88b50 100%)",
          color: "var(--bg)", fontSize: "12px", fontWeight: 700,
          display: "flex", alignItems: "center", justifyContent: "center",
          fontFamily: "var(--mono)",
          flexShrink: 0
        }}>{index + 1}</div>
        {isPast && (
          <span style={{
            fontSize: "9px", fontFamily: "var(--mono)", fontWeight: 600,
            letterSpacing: "0.1em", textTransform: "uppercase",
            background: "rgba(201,168,107,0.15)",
            color: "var(--accent)",
            padding: "2px 7px", borderRadius: "999px",
            border: "1px solid rgba(201,168,107,0.3)",
            flexShrink: 0
          }}>consumed</span>
        )}

        <select
          value={dose.type}
          onChange={e => {
            if (locked) return;
            const t = e.target.value;
            const base = DRINKS[t];
            onChange({ type: t, mg: t === "custom" ? dose.mg : base.mg });
          }}
          disabled={locked}
          style={{ flex: 1, minWidth: 0, opacity: locked ? 0.55 : 1, cursor: locked ? "not-allowed" : "pointer" }}
          aria-label={`Drink type for dose ${index + 1}`}
        >
          {Object.entries(DRINKS).map(([k, v]) => (
            <option key={k} value={k}>{v.icon}  {v.label}</option>
          ))}
        </select>

        <button
          onClick={toggleLock}
          title={locked ? "Unlock — allow optimizer to modify" : "Lock — pin this dose (e.g., already consumed)"}
          style={{
            width: "32px", height: "32px", borderRadius: "8px",
            border: `1px solid ${locked ? "rgba(201,168,107,0.5)" : "var(--line)"}`,
            background: locked ? "rgba(201,168,107,0.12)" : "transparent",
            color: locked ? "var(--accent-2)" : "var(--ink-soft)",
            cursor: "pointer",
            fontSize: "13px",
            display: "flex", alignItems: "center", justifyContent: "center",
            transition: "all 0.15s ease",
            flexShrink: 0
          }}
          onMouseEnter={e => {
            if (locked) return;
            e.currentTarget.style.color = "var(--accent-2)";
            e.currentTarget.style.borderColor = "rgba(201,168,107,0.4)";
          }}
          onMouseLeave={e => {
            if (locked) return;
            e.currentTarget.style.color = "var(--ink-soft)";
            e.currentTarget.style.borderColor = "var(--line)";
          }}
          aria-label={locked ? "Unlock dose" : "Lock dose"}
          aria-pressed={locked}
        >
          {locked ? "🔒" : "🔓"}
        </button>

        <button
          onClick={isOnlyDose ? undefined : onRemove}
          disabled={isOnlyDose}
          title={isOnlyDose ? "You need at least one dose" : `Remove dose ${index + 1}`}
          style={{
            width: "32px", height: "32px", borderRadius: "8px",
            border: "1px solid var(--line)", background: "transparent",
            color: "var(--ink-soft)",
            cursor: isOnlyDose ? "not-allowed" : "pointer",
            fontSize: "14px",
            display: "flex", alignItems: "center", justifyContent: "center",
            transition: "all 0.15s ease",
            opacity: isOnlyDose ? 0.35 : 1,
            flexShrink: 0
          }}
          onMouseEnter={e => {
            if (isOnlyDose) return;
            e.currentTarget.style.color = "var(--bad)";
            e.currentTarget.style.borderColor = "var(--bad)";
          }}
          onMouseLeave={e => {
            e.currentTarget.style.color = "var(--ink-soft)";
            e.currentTarget.style.borderColor = "var(--line)";
          }}
          aria-label={isOnlyDose ? "Cannot remove the only dose" : `Remove dose ${index + 1}`}
        >
          ✕
        </button>
      </div>

      {/* Bottom: two stacked sliders */}
      <div style={{ display: "flex", flexDirection: "column", gap: "10px", opacity: locked ? 0.7 : 1 }}>
        <div style={{ display: "flex", flexDirection: "column", gap: "5px" }}>
          <label style={{
            fontSize: "10px", color: "var(--ink-soft)", textTransform: "uppercase",
            letterSpacing: "0.15em", fontFamily: "var(--mono)", fontWeight: 500,
            display: "flex", justifyContent: "space-between", alignItems: "baseline"
          }}>
            <span>Time</span>
            <span style={{
              color: "var(--accent)", fontWeight: 600, fontSize: "13px",
              letterSpacing: "normal", textTransform: "none"
            }}>{fmtTime(draftTime, true)}</span>
          </label>
          <input
            type="range"
            min={T_MIN} max={T_MAX} step={5/60}
            value={draftTime}
            onChange={handleTimeChange}
            disabled={locked}
            style={{ "--pct": `${timePct}%`, cursor: locked ? "not-allowed" : "pointer" }}
            aria-label={`Time for dose ${index + 1}`}
          />
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: "5px" }}>
          <label style={{
            fontSize: "10px", color: "var(--ink-soft)", textTransform: "uppercase",
            letterSpacing: "0.15em", fontFamily: "var(--mono)", fontWeight: 500,
            display: "flex", justifyContent: "space-between", alignItems: "baseline"
          }}>
            <span>Amount</span>
            <span style={{
              color: "var(--accent)", fontWeight: 600, fontSize: "13px",
              letterSpacing: "normal", textTransform: "none"
            }}>{draftMg} mg</span>
          </label>
          <input
            type="range"
            min={10} max={400} step={5}
            value={draftMg}
            onChange={handleMgChange}
            disabled={locked}
            style={{ "--pct": `${((draftMg - 10) / 390) * 100}%`, cursor: locked ? "not-allowed" : "pointer" }}
            aria-label={`Amount in mg for dose ${index + 1}`}
          />
        </div>
      </div>
    </div>
  );
}

function ScheduleRow({ label, hint, value, setValue, min, max }) {
  const [draft, setDraft] = useState(value);
  useEffect(() => { setDraft(value); }, [value]);
  const timerRef = useRef(null);
  useEffect(() => () => clearTimeout(timerRef.current), []);
  const pct = ((draft - min) / (max - min)) * 100;
  const handleChange = e => {
    const v = parseFloat(e.target.value);
    setDraft(v);
    clearTimeout(timerRef.current);
    timerRef.current = setTimeout(() => setValue(v), 120);
  };
  return (
    <div style={{
      display: "grid",
      gridTemplateColumns: "minmax(0, 1fr) auto",
      gap: "4px 16px",
      alignItems: "center"
    }}>
      <div>
        <div style={{ fontSize: "14px", fontWeight: 500, color: "var(--ink)" }}>{label}</div>
        {hint && <div style={{ fontSize: "12px", color: "var(--ink-soft)", marginTop: "2px" }}>{hint}</div>}
      </div>
      <div style={{
        fontFamily: "var(--mono)", fontSize: "14px", fontWeight: 600,
        color: "var(--accent)", minWidth: "90px", textAlign: "right"
      }}>
        {fmtTime(draft, true)}{draft >= 24 ? " +1d" : ""}
      </div>
      <input
        type="range"
        min={min} max={max} step={0.25}
        value={draft}
        onChange={handleChange}
        style={{ gridColumn: "1 / -1", "--pct": `${pct}%` }}
      />
    </div>
  );
}

function Legend({ showNow, showBlocked }) {
  const items = [
    { c: "var(--accent)", l: "Caffeine" },
    { c: "rgba(111,201,165,0.4)", l: "Peak window", sq: true },
    { c: "rgba(232,114,114,0.4)", l: "Sleep window", sq: true },
    { c: "var(--good)", l: "Safe marker", dot: true },
    ...(showNow ? [{ c: "rgba(243,238,228,0.55)", l: "Now", dash: true }] : []),
    ...(showBlocked ? [{ c: "rgba(232,154,79,0.5)", l: "Unavailable", sq: true }] : []),
  ];
  return (
    <div style={{ display: "flex", gap: "14px", flexWrap: "wrap", fontSize: "11px", color: "var(--ink-soft)", fontFamily: "var(--mono)" }}>
      {items.map((it, i) => (
        <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: "6px" }}>
          {it.dash
            ? <span style={{ width: "12px", borderBottom: `2px dashed ${it.c}`, display: "inline-block" }} />
            : <span style={{
                width: "10px", height: it.sq ? "10px" : (it.dot ? "8px" : "2px"),
                borderRadius: it.dot ? "50%" : "2px",
                background: it.c,
                display: "inline-block"
              }} />
          }
          {it.l}
        </span>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
